name: anchor
description: "Anchor — ownership ratio journaling."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  go_router: ^14.0.0
  flutter_screenutil: ^5.9.3
  # Sprint 2: on-device persistence (Drift + SQLite), import/export flows
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0
  path: ^1.9.1
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  file_picker: ^8.1.0
  permission_handler: ^11.3.1
  percent_indicator: ^4.2.3
  fl_chart: ^0.70.0
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  emoji_picker_flutter: ^4.4.0
  shared_preferences: ^2.5.5
  blobs: ^2.0.0
  flutter_liquid_glass_plus: 0.0.7
  bubble_picker:
    path: packages/bubble_picker
  flutter_launcher_icons: ^0.14.4
  rive: ^0.13.20
  rive_animated_icon: ^2.0.5
  flutter_confetti: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/focus_filter/
    - assets/onboarding/
